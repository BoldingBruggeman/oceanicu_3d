# NS simulation campaign — replace kb.bash
#
# Single run:
#   python run_simulation.py ns_run.yaml
#
# Override from CLI:
#   python run_simulation.py ns_run.yaml --experiment Sensitivity1
#
# Dry run (print what would happen):
#   python run_simulation.py ns_run.yaml --dryrun

base_outdir: "/data/{user}/{area}"
conda_env: pygetm

# Files copied to outdir (captured for reproducibility)
copy:
  - gotm.yaml
  - output.yaml

# Dirs/files symlinked into outdir (needed for relative paths in model YAML)
symlinks:
  - name: Bathymetry
    target: "{BATHYMETRY_FOLDER}"

# ── Simulation parameters ──────────────────────────────────────────────────
area:       NS
experiment: Baseline
model_yaml: ns_model_config.yaml
np:         15
initial_date: "2015-12-01"
stop_date:    "2024-01-01"
# start_date: "2020-01-01"   # uncomment to resume from a different date
chunks:           annual      # annual | monthly | daily
chunk_multiplier: 1

# Set METEO_FOLDER for ERA5 (default) or CMIP6 runs
env:
  METEO_FOLDER: "{ERA5_FOLDER}"
  # METEO_SOURCE: CMIP6
  # METEO_FOLDER: "{CMIP6_FOLDER}/{experiment}"
