# NS experiments — validation and scenario runs
#
# Usage:
#   python run_simulation.py ns_experiments.yaml           # all runs
#   python run_simulation.py ns_experiments.yaml --experiment Baseline
#   python run_simulation.py ns_experiments.yaml --dryrun

base_outdir: "/data/{user}/{area}"
conda_env: pygetm

copy:
  - gotm.yaml
symlinks:
  - Bathymetry

initial_date: "2015-12-01"
stop_date:    "2024-01-01"
chunks:           annual
chunk_multiplier: 1

runs:
  - area: NS
    experiment: Baseline
    model_yaml: ns_validation.yaml
    np: 15
    # ERA5 is default — no env override needed

  - area: NS
    experiment: ssp585
    model_yaml: ns_validation.yaml
    np: 15
    env:
      METEO_SOURCE: CMIP6
      METEO_FOLDER: "{METEO_FOLDER}/{experiment}"

  - area: NS
    experiment: ssp126
    model_yaml: ns_validation.yaml
    np: 15
    env:
      METEO_SOURCE: CMIP6
      METEO_FOLDER: "{METEO_FOLDER}/{experiment}"
