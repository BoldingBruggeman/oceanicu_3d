# Machine-specific environment variables for data folders.
# Keyed by hostname (exact match, or prefix match for cluster nodes).
# Run: python -c "import socket; print(socket.gethostname())" to find yours.

orca:
  env:
    HYDROGRAPHY_FOLDER:         /server/data/WOA
    TPXO_FOLDER:                /server/data/TPXO9
    BOUNDARY_FOLDER_BAROTROPIC: /data/kb/OceanICU/oceanicu_3d/experiments
    BOUNDARY_FOLDER_BAROCLINIC: /data/kb/OceanICU/oceanicu_3d/experiments
    ERA5_FOLDER:                /data/ERA5/NA
    RIVER_FOLDER:               /data/EMORID
    RIVER_FILE:                 EMORID_1990_2024.nc
    FABM_FOLDER:                /data/FABM
    BATHYMETRY_FOLDER:          /data/Bathymetry/NS

bb-server1:
  env:
    HYDROGRAPHY_FOLDER:         /data/WOA
    TPXO_FOLDER:                /data/TPXO9
    BOUNDARY_FOLDER_BAROTROPIC: /data/OceanICU/oceanicu_3d/experiments/
    BOUNDARY_FOLDER_BAROCLINIC: /data/OceanICU/oceanicu_3d/experiments/
    ERA5_FOLDER:                /data/ERA5/NA
    CMIP6_FOLDER:               /data/BiasCorrected/MPI-ESM1-2-HR
    RIVER_FOLDER:               /data/EMORID
    RIVER_FILE:                 EMORID_1990_2024.nc
    FABM_FOLDER:                /data/FABM
    BATHYMETRY_FOLDER:          /data/Bathymetry/NS

scylla:
  env:
    HYDROGRAPHY_FOLDER:         /work/shared/oceanICU/WOA
    TPXO_FOLDER:                /work/shared/oceanICU/TPXO9
    BOUNDARY_FOLDER_BAROTROPIC: /work/shared/OceanICU/experiments
    BOUNDARY_FOLDER_BAROCLINIC: /work/shared/OceanICU/experiments
    ERA5_FOLDER:                /work/shared/oceanICU/ERA5/NA
    BATHYMETRY_FOLDER:          /work/shared/oceanICU/Bathymetry/
    RIVER_FOLDER:               /work/shared/oceanICU/EMORID
    RIVER_FILE:                 EMORID_1990_2024.nc
    FABM_FOLDER:                /work/shared/oceanICU/FABM
